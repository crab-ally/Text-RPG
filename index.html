<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon RPG - 텍스트 모드</title>
    <!-- 외부 스타일시트 및 폰트 연결 -->
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="game-container">
        <!-- 게임 제목 헤더 -->
        <header>
            <h1><span class="accent">RPG</span></h1>
        </header>

        <div class="main-layout">
            <!-- 왼쪽 사이드바: 스탯 그리드 배치 -->
            <aside class="sidebar">
                <section class="stats-grid">
                    <div class="stat-box">
                        <span class="label">ATK</span>
                        <span id="player-atk" class="value">10</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">DEF</span>
                        <span id="player-def" class="value">5</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">GOLD</span>
                        <span id="player-gold" class="value">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">EXP</span>
                        <span id="player-exp" class="value">0 / 100</span>
                    </div>
                </section>
            </aside>

            <!-- 오른쪽 메인 콘텐츠 영역 -->
            <main class="game-content">
                <!-- 상단 상태 패널: 플레이어 및 몬스터의 HP 표시 -->
                <section class="status-panel">
                    <div class="status-item">
                        <span class="label">LV</span>
                        <span id="player-lvl" class="value">1</span>
                    </div>
                    <div class="status-item">
                        <span class="label">HP</span>
                        <div class="bar-container">
                            <!-- 플레이어 체력 바 (JS로 너비 조절) -->
                            <div id="player-hp-bar" class="bar hp-bar" style="width: 100%;"></div>
                            <span id="player-hp" class="bar-text">100 / 100</span>
                        </div>
                    </div>
                    <!-- 전투 중에만 나타나는 몬스터 상태 창 -->
                    <div id="monster-status" class="status-item hidden">
                        <span id="monster-name" class="label">MONSTER</span>
                        <div class="bar-container">
                            <div id="monster-hp-bar" class="bar monster-bar" style="width: 100%;"></div>
                            <span id="monster-hp" class="bar-text">50 / 50</span>
                        </div>
                    </div>
                </section>

                <!-- 게임 로그 패널: 게임의 진행 상황을 텍스트로 출력 -->
                <section id="log-panel" class="log-panel">
                    <div class="log-entry">네온 RPG에 오신 것을 환영합니다.</div>
                    <div class="log-entry">모험을 시작하려면 '탐험하기' 버튼을 누르세요.</div>
                </section>

                <!-- 하단 액션 패널: 플레이어의 조작 버튼들 -->
                <section class="action-panel">
                    <!-- 일반 상태에서의 액션 (탐험, 휴식) -->
                    <div id="main-actions" class="button-group">
                        <button id="btn-explore" class="btn primary">탐험하기</button>
                        <button id="btn-rest" class="btn secondary">휴식하기</button>
                    </div>
                    <!-- 전투 상태에서의 액션 (공격, 도망) -->
                    <div id="battle-actions" class="button-group hidden">
                        <button id="btn-attack" class="btn danger">공격</button>
                        <button id="btn-run" class="btn warning">도망치기</button>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- 게임 로직 자바스크립트 연결 -->
    <script src="app.js"></script>
</body>

</html>
